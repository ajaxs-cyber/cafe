<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 · 黑泡咖啡</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="brand login-brand">
      <span class="brand-mark">黑泡</span>
      <span class="brand-text">黑泡咖啡 · 经营管理</span>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" class="login-form">
      <label>账号
        <input type="text" name="username" required autocomplete="username" placeholder="admin">
      </label>
      <label>密码
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </label>
      <button class="btn btn-primary btn-block" type="submit">登录</button>
    </form>
    <p class="login-tip">默认账号 <code>admin</code>，密码通过环境变量 <code>ADMIN_PASSWORD</code> 配置<br>（未配置时默认为 <code>heypour2025</code>，部署后请自行修改）。</p>
    <a class="muted-link" href="{{ url_for('index') }}">← 返回商城首页</a>
  </div>
</body>
</html>
