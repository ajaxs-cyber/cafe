<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}经营管理 · 黑泡咖啡{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="admin-body">
<header class="admin-header">
  <div class="container admin-header-inner">
    <a class="brand" href="{{ url_for('admin_home') }}">
      <span class="brand-mark">黑泡</span>
      <span class="brand-text">经营管理后台</span>
    </a>
    <nav class="admin-nav">
      <a href="{{ url_for('admin_orders') }}" class="{{ 'active' if request.endpoint == 'admin_orders' }}">订单管理</a>
      <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint == 'admin_dashboard' }}">试点数据看板</a>
      <a href="{{ url_for('admin_settings') }}" class="{{ 'active' if request.endpoint == 'admin_settings' }}">收款码设置</a>
      <a href="{{ url_for('index') }}" target="_blank">查看商城 ↗</a>
      <a href="{{ url_for('admin_logout') }}" class="muted-link">退出登录</a>
    </nav>
  </div>
</header>
<main class="admin-main">
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</main>
{% block scripts %}{% endblock %}
</body>
</html>
