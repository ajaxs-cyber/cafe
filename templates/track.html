{% extends "base.html" %}
{% block title %}订单查询 · 黑泡咖啡{% endblock %}
{% block content %}
<section class="section">
  <div class="container narrow">
    <h1 class="section-title">订单查询</h1>
    <p class="section-sub">输入订单号与下单时填写的手机号，即可查看订单状态。</p>
    <form class="track-form" id="trackForm">
      <label>订单号
        <input type="text" name="order_no" required placeholder="如 CF250718A3F9" maxlength="16">
      </label>
      <label>手机号
        <input type="tel" name="phone" required placeholder="下单时填写的手机号" maxlength="11">
      </label>
      <button class="btn btn-primary btn-block" type="submit">查询订单</button>
    </form>
    <div class="track-result" id="trackResult" hidden></div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/track.js') }}"></script>
{% endblock %}
